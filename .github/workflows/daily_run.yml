name: Daily SARIMAX Forecast Run

on:
  # Automated schedule: Daily at 09:00 UTC
  schedule:
    - cron: '0 9 * * *'
  
  # Manual trigger: Enables the "Run workflow" button in the Actions tab
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Removed cache: 'pip' to avoid the "No file matched" error

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib statsmodels nbconvert ipykernel

      - name: Execute Forecast Notebook
        # Using nbconvert to execute the .ipynb file directly
        run: |
          jupyter nbconvert --to notebook --execute Sarimax_model.ipynb

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: forecast-results
          path: |
            *.png
            *.csv